<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - College Fest Management</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand navbar-brand-custom" href="#">
                <i class="fas fa-rocket me-2"></i>COLLEGE FEST 2024
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                    style="background: var(--primary-red);">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link-custom active" href="#" onclick="showSection('events')">
                            <i class="fas fa-calendar-alt me-1"></i>Events
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-custom" href="#" onclick="showSection('myRegistrations')">
                            <i class="fas fa-clipboard-check me-1"></i>My Registrations
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-custom" href="#" onclick="showSection('announcements')">
                            <i class="fas fa-bullhorn me-1"></i>Announcements
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-custom" href="#" onclick="showSection('profile')">
                            <i class="fas fa-user me-1"></i>Profile
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-custom" href="php/logout.php">
                            <i class="fas fa-sign-out-alt me-1"></i>Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <div class="container-fluid mt-4">
        <!-- Events Section -->
        <div id="eventsSection" class="content-section">
            <div class="row">
                <div class="col-12">
                    <h2 class="text-white mb-4">
                        <i class="fas fa-fire me-2 gradient-text"></i>Upcoming Events
                    </h2>
                </div>
            </div>
            
            <!-- Filter Options -->
            <div class="row mb-4">
                <div class="col-md-4 mb-3">
                    <input type="text" class="form-control form-control-custom" id="searchEvents" 
                           placeholder="Search events..." onkeyup="filterEvents()">
                </div>
                <div class="col-md-4 mb-3">
                    <select class="form-control form-control-custom" id="filterType" onchange="filterEvents()">
                        <option value="">All Categories</option>
                        <option value="Technical">Technical</option>
                        <option value="Cultural">Cultural</option>
                        <option value="Sports & Gaming">Sports & Gaming</option>
                        <option value="Academic">Academic</option>
                        <option value="Creative">Creative</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <button class="btn btn-outline-custom w-100" onclick="loadEvents()">
                        <i class="fas fa-sync me-2"></i>Refresh Events
                    </button>
                </div>
            </div>
            
            <!-- Events Grid -->
            <div class="row" id="eventsContainer">
                <!-- Will be populated dynamically -->
            </div>
        </div>
        
        <!-- My Registrations Section -->
        <div id="myRegistrationsSection" class="content-section" style="display: none;">
            <div class="row">
                <div class="col-12">
                    <h2 class="text-white mb-4">
                        <i class="fas fa-clipboard-check me-2 gradient-text"></i>My Registrations
                    </h2>
                </div>
            </div>
            
            <div class="row" id="myRegistrationsContainer">
                <!-- Will be populated dynamically -->
            </div>
        </div>
        
        <!-- Announcements Section -->
        <div id="announcementsSection" class="content-section" style="display: none;">
            <div class="row">
                <div class="col-12">
                    <h2 class="text-white mb-4">
                        <i class="fas fa-bullhorn me-2 gradient-text"></i>Latest Announcements
                    </h2>
                </div>
            </div>
            
            <div class="row" id="announcementsContainer">
                <!-- Will be populated dynamically -->
            </div>
        </div>
        
        <!-- Profile Section -->
        <div id="profileSection" class="content-section" style="display: none;">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="custom-card">
                        <h2 class="text-white mb-4">
                            <i class="fas fa-user-circle me-2 gradient-text"></i>My Profile
                        </h2>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label-custom">Name</label>
                                <input type="text" class="form-control form-control-custom" id="profileName" readonly>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label-custom">Email</label>
                                <input type="email" class="form-control form-control-custom" id="profileEmail" readonly>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label-custom">College</label>
                            <input type="text" class="form-control form-control-custom" id="profileCollege" readonly>
                        </div>
                        
                        <div class="row mt-4">
                            <div class="col-md-4 mb-3">
                                <div class="stat-card">
                                    <div class="stat-icon">
                                        <i class="fas fa-ticket-alt"></i>
                                    </div>
                                    <div class="stat-number" id="userEventsCount">0</div>
                                    <div class="stat-label">Events Registered</div>
                                </div>
                            </div>
                            <div class="col-md-4 mb-3">
                                <div class="stat-card">
                                    <div class="stat-icon">
                                        <i class="fas fa-rupee-sign"></i>
                                    </div>
                                    <div class="stat-number" id="userTotalSpent">0</div>
                                    <div class="stat-label">Total Spent</div>
                                </div>
                            </div>
                            <div class="col-md-4 mb-3">
                                <div class="stat-card">
                                    <div class="stat-icon">
                                        <i class="fas fa-calendar-check"></i>
                                    </div>
                                    <div class="stat-number" id="upcomingEvents">0</div>
                                    <div class="stat-label">Upcoming Events</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Event Details Modal -->
    <div class="modal fade" id="eventDetailsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalEventTitle"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalEventBody">
                    <!-- Will be populated dynamically -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-custom" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary-custom" id="registerBtn" onclick="registerForEvent()">
                        <i class="fas fa-check me-2"></i>Register Now
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Custom JS -->
    <script src="js/main.js"></script>
    
    <script src="js/user.js"></script>
</body>
</html>
