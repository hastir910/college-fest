<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - College Fest Management System</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            max-width: 450px;
            width: 100%;
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: var(--text-gray);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card custom-card scale-in">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo-icon gradient-text">
                    <i class="fas fa-rocket"></i>
                </div>
                <h1 class="gradient-text">COLLEGE FEST 2024</h1>
            </div>
            
            <!-- Login Header -->
            <div class="login-header">
                <h2 class="text-white">Welcome Back!</h2>
                <p>Sign in to continue to your dashboard</p>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label-custom">Email Address</label>
                    <input type="email" class="form-control form-control-custom" id="loginEmail" 
                           placeholder="Enter your email" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label-custom">Password</label>
                    <input type="password" class="form-control form-control-custom" id="loginPassword" 
                           placeholder="Enter your password" required>
                </div>
                
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label text-gray" for="rememberMe">
                        Remember me
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 mb-3">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>
            </form>
            
            <!-- Divider -->
            <div class="text-center my-3">
                <span class="text-gray">Don't have an account?</span>
            </div>
            
            <!-- Register Button -->
            <button class="btn btn-outline-custom w-100" data-bs-toggle="modal" data-bs-target="#registerModal">
                <i class="fas fa-user-plus me-2"></i>Create New Account
            </button>
            
            <!-- Demo Credentials -->
            <div class="mt-4 p-3 glass-effect" style="border-radius: 10px;">
                <p class="text-center text-white mb-2"><strong>Demo Credentials:</strong></p>
                <p class="text-gray mb-1"><i class="fas fa-user-shield me-2"></i><strong>Admin:</strong> admin@fest.com / admin123</p>
                <p class="text-gray mb-0"><i class="fas fa-user me-2"></i><strong>User:</strong> user@fest.com / user123</p>
            </div>
        </div>
    </div>
    
    <!-- Registration Modal -->
    <div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="registerModalLabel">
                        <i class="fas fa-user-plus me-2"></i>Create New Account
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label-custom">Full Name</label>
                            <input type="text" class="form-control form-control-custom" id="registerName" 
                                   placeholder="Enter your full name" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label-custom">Email Address</label>
                            <input type="email" class="form-control form-control-custom" id="registerEmail" 
                                   placeholder="Enter your email" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label-custom">Phone Number</label>
                            <input type="tel" class="form-control form-control-custom" id="registerPhone" 
                                   placeholder="10-digit phone number" maxlength="10" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label-custom">College Name</label>
                            <input type="text" class="form-control form-control-custom" id="registerCollege" 
                                   placeholder="Enter your college name" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label-custom">Password</label>
                            <input type="password" class="form-control form-control-custom" id="registerPassword" 
                                   placeholder="Create a password (min 6 characters)" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label-custom">Confirm Password</label>
                            <input type="password" class="form-control form-control-custom" id="registerConfirmPassword" 
                                   placeholder="Confirm your password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary-custom w-100">
                            <i class="fas fa-check me-2"></i>Register Now
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- Custom JS -->
    <script src="js/main.js"></script>
    
    <script>
        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            // Validate form
            if (!festUtils.validateLoginForm(email, password)) {
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('email', email);
                formData.append('password', password);
                
                const response = await fetch('php/login.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    festUtils.showAlert(result.message, 'success');
                    
                    // Redirect based on role
                    setTimeout(() => {
                        if (result.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'user.html';
                        }
                    }, 1000);
                } else {
                    festUtils.showAlert(result.message, 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                festUtils.showAlert('An error occurred. Please try again.', 'error');
            }
        });
        
        // Registration Form Handler
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const phone = document.getElementById('registerPhone').value;
            const college = document.getElementById('registerCollege').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            
            // Validate form
            if (!festUtils.validateRegistrationForm(name, email, password, confirmPassword, phone, college)) {
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('name', name);
                formData.append('email', email);
                formData.append('phone', phone);
                formData.append('college', college);
                formData.append('password', password);
                
                const response = await fetch('php/register_user.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    festUtils.showAlert(result.message, 'success');
                    
                    // Close modal and reset form
                    setTimeout(() => {
                        bootstrap.Modal.getInstance(document.getElementById('registerModal')).hide();
                        document.getElementById('registerForm').reset();
                    }, 1500);
                } else {
                    festUtils.showAlert(result.message, 'error');
                }
            } catch (error) {
                console.error('Registration error:', error);
                festUtils.showAlert('An error occurred. Please try again.', 'error');
            }
        });
    </script>
</body>
</html>
